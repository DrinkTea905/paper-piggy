<svg width="680" height="660" viewBox="0 0 680 660" role="img" xmlns="http://www.w3.org/2000/svg">
<title>三层知识编译示意图：原始层 raw → AI 编译 → 知识层 wiki</title>
<desc>暖米色背景。顶部原始层是散落的 PDF/论文/笔记/网页文档卡片，只读；中间蓝色 AI 编译节点按 Schema 规则把资料编译成知识；底部知识层是结构化的概念页、实体页、索引，带双向链接。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="660" fill="#F3EEE3"/>

<text x="340" y="52" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="28" font-weight="500">把资料「编译」成知识</text>
<text x="340" y="82" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="16" font-weight="400">Andrej Karpathy · LLM Wiki 三层结构</text>

<rect x="90" y="118" width="500" height="150" rx="16" fill="#FDFBF5" stroke="#FF6F61" stroke-width="1.5" stroke-dasharray="7 5"/>
<rect x="108" y="103" width="152" height="30" rx="15" fill="#FF6F61"/>
<text x="184" y="123" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="500">① 原始层 raw/</text>

<rect x="128" y="150" width="86" height="62" rx="8" fill="#FFFFFF" stroke="#22201C" stroke-width="1"/>
<text x="171" y="187" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="14" font-weight="400">PDF</text>
<rect x="240" y="150" width="86" height="62" rx="8" fill="#FFFFFF" stroke="#22201C" stroke-width="1"/>
<text x="283" y="187" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="14" font-weight="400">论文</text>
<rect x="352" y="150" width="86" height="62" rx="8" fill="#FFFFFF" stroke="#22201C" stroke-width="1"/>
<text x="395" y="187" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="14" font-weight="400">笔记</text>
<rect x="464" y="150" width="86" height="62" rx="8" fill="#FFFFFF" stroke="#22201C" stroke-width="1"/>
<text x="507" y="187" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="14" font-weight="400">网页</text>
<text x="340" y="250" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="13" font-weight="400">散落的原始资料 · 只读，永不改动</text>

<line x1="340" y1="268" x2="340" y2="298" stroke="#22201C" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="210" y="300" width="260" height="78" rx="16" fill="#2F6BFF"/>
<text x="340" y="332" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="15" font-weight="500">② 编译层 · AI 编译</text>
<text x="340" y="358" text-anchor="middle" fill="#D6E2FF" font-family="sans-serif" font-size="14" font-weight="400">读懂 → 提炼 → 结构化</text>

<rect x="486" y="308" width="170" height="62" rx="12" fill="none" stroke="#FF6F61" stroke-width="1.5"/>
<text x="571" y="334" text-anchor="middle" fill="#FF6F61" font-family="sans-serif" font-size="14" font-weight="500">Schema 规则契约</text>
<text x="571" y="354" text-anchor="middle" fill="#B4685F" font-family="sans-serif" font-size="12" font-weight="400">你定的规则</text>
<line x1="470" y1="339" x2="484" y2="339" stroke="#FF6F61" stroke-width="1" stroke-dasharray="4 3"/>

<line x1="340" y1="378" x2="340" y2="408" stroke="#22201C" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="90" y="410" width="500" height="172" rx="16" fill="#EAF0FF" stroke="#2F6BFF" stroke-width="1.5"/>
<rect x="108" y="395" width="160" height="30" rx="15" fill="#2F6BFF"/>
<text x="188" y="415" text-anchor="middle" fill="#FFFFFF" font-family="sans-serif" font-size="14" font-weight="500">③ 知识层 wiki/</text>

<rect x="125" y="438" width="110" height="74" rx="10" fill="#FFFFFF" stroke="#2F6BFF" stroke-width="1"/>
<text x="180" y="472" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="15" font-weight="500">概念页</text>
<text x="180" y="493" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="12" font-weight="400">concept</text>
<rect x="285" y="438" width="110" height="74" rx="10" fill="#FFFFFF" stroke="#2F6BFF" stroke-width="1"/>
<text x="340" y="472" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="15" font-weight="500">实体页</text>
<text x="340" y="493" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="12" font-weight="400">entity</text>
<rect x="445" y="438" width="110" height="74" rx="10" fill="#FFFFFF" stroke="#2F6BFF" stroke-width="1"/>
<text x="500" y="472" text-anchor="middle" fill="#22201C" font-family="sans-serif" font-size="15" font-weight="500">索引</text>
<text x="500" y="493" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="12" font-weight="400">index.md</text>

<line x1="235" y1="475" x2="285" y2="475" stroke="#2F6BFF" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="395" y1="475" x2="445" y2="475" stroke="#2F6BFF" stroke-width="1.2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="340" y="562" text-anchor="middle" fill="#5A6B8C" font-family="sans-serif" font-size="13" font-weight="400">结构化知识页 · 双向链接 · 随问随答带引用</text>

<text x="340" y="618" text-anchor="middle" fill="#8A8272" font-family="sans-serif" font-size="15" font-weight="400">越用越厚 · 全程本地 · 知识属于你自己</text>
</svg>
